id: unquoted-service-path
title: Windows Unquoted Service Path Privilege Escalation
platform: windows
category: misconfiguration
severity: high
summary: >-
  A Windows service with an unquoted executable path containing spaces lets a
  low-privilege user plant a binary that the SCM runs as SYSTEM on next restart.
description: >-
  When a Windows service's `ImagePath` is unquoted and the path contains at
  least one space, the Service Control Manager applies a fixed parsing rule:
  it tries each progressively longer prefix ending with `.exe` until one
  resolves. For example, `C:\Program Files\My App\svc.exe` is tried as
  `C:\Program.exe`, then `C:\Program Files\My.exe`, then the full path.
  If a low-privilege user can write to any intermediate directory in that
  search sequence, they can drop an executable with the expected short name
  and have it run as SYSTEM on next service start. The vulnerability is a
  mismatch between the intended service path and what Windows actually
  resolves — identical to the confusion between a sudo rule granting access
  to one binary while the binary itself can be used as another.
mitre_attack:
  - technique_id: T1574.009
    name: 'Hijack Execution Flow: Path Interception by Unquoted Path'
requirements:
  - A Windows service whose `ImagePath` value is unquoted and contains a space
  - Write access to at least one intermediate directory in the unquoted path
  - The service must be able to restart (auto-start, or the attacker can trigger a restart)
exploitation_steps:
  - Enumerate all services with unquoted paths via `sc qc <svc>` or registry inspection under `HKLM\SYSTEM\CurrentControlSet\Services`.
  - Identify which intermediate path components (e.g. `C:\Program Files\`) are writable by the current user.
  - Compile or drop a payload executable named for the expected short prefix (e.g. `C:\Program.exe`).
  - Wait for or trigger a service restart; the SCM resolves the short prefix first and executes the payload as SYSTEM.
poc:
  - exploit.py
detections:
  - type: sigma
    path: detections/sigma/unquoted_service_path.yml
    description: Detects registry writes creating or modifying service ImagePath values that are unquoted and contain spaces.
mitigations:
  - Quote all service ImagePath values; `sc config <svc> binpath= "\"C:\path with spaces\bin.exe\""`.
  - Restrict write access to `C:\`, `C:\Program Files\`, and other directories that appear in service paths.
  - Run `wmic service get name,pathname | findstr /i /v "C:\Windows"` periodically and alert on any unquoted path containing spaces.
  - Use Windows Defender Attack Surface Reduction rules and STIG baselines that flag unquoted paths at install time.
references:
  - title: 'MITRE ATT&CK T1574.009'
    url: https://attack.mitre.org/techniques/T1574/009/
  - title: 'CWE-428: Unquoted Search Path or Element'
    url: https://cwe.mitre.org/data/definitions/428.html
  - title: 'SpecterOps: Unquoted Service Paths'
    url: https://posts.specterops.io/code-signing-certificate-cloning-attacks-and-defenses-6f98657fc6ec
disclaimer: >-
  For authorized security testing and lab use only. exploit.py modifies the
  filesystem and triggers service restarts — run only against systems you own
  or are explicitly authorized to test.
